# Grafana dashboard-provider — подхватывает JSON-дашборды из этой папки.
apiVersion: 1

providers:
  - name: capsule
    orgId: 1
    folder: Capsule
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
