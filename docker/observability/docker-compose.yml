# capsule observability — self-hosted мониторинг параллельных Claude Code инстансов.
# Каждый CC-инстанс стартует со своим OTEL_RESOURCE_ATTRIBUTES="scope=<pkg>" (см.
# claude-scope.ps1 / claude-scope.sh) и шлёт телеметрию в collector :4317.
# Collector веером: метрики → Prometheus, события/логи → Loki. Сверху Grafana.
#
# Запуск:  docker compose up -d   (из этой директории)
# Grafana: http://localhost:3300  (anonymous admin, без логина)
# Стоп:    docker compose down     (данные сохраняются в named volumes)
#
# Порты подобраны так, чтобы не конфликтовать с dev-серверами репо
# (3000 sandbox · 3001 ewc · 3050 playground · 3100 nexus · 4873 verdaccio).
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: capsule-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — сюда подключаются CC-инстансы с хоста
      - "4318:4318"   # OTLP HTTP — на случай http/protobuf-инстансов
    depends_on:
      - loki
      - prometheus

  loki:
    image: grafana/loki:3.1.1
    container_name: capsule-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      # Grafana/collector ходят по compose-сети (loki:3100). Host-порт добавлен для
      # хостовых потребителей LogQL — brainer-backend читает активность сессий
      # `{scope="X"}` с хоста (Omnifield Brainer, agent-оркестрация).
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: capsule-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # debug-UI (free port); Grafana ходит по сети (prometheus:9090)

  grafana:
    image: grafana/grafana:11.2.2
    container_name: capsule-grafana
    restart: unless-stopped
    environment:
      # Локальный self-hosted стенд — без логина, anonymous Admin.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3333:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
