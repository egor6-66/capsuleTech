# Loki 3.x — single-binary, filesystem-хранилище, нативный OTLP-ingest.
# allow_structured_metadata: true обязателен — OTLP-атрибуты (scope, tool_name,
# prompt.id) приходят как structured metadata, иначе ingest отклоняется.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h   # 7 дней
  # Поднимаем scope/package из OTLP resource-атрибутов в индексируемые лейблы —
  # тогда в Grafana доступен stream-селектор {scope="web-ui"} и template-переменная.
  # ignore_defaults: false — оставляем дефолтные (service.name и пр.) + добавляем свои.
  otlp_config:
    resource_attributes:
      ignore_defaults: false
      attributes_config:
        - action: index_label
          attributes:
            - scope
            - package

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
