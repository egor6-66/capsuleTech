# capsule dev-gateway (ADR 068 D6) — dev-prod parity: один origin, path-роутинг.
#
# Карта маршрутов (source of truth; прод-nginx повторяет ФОРМУ этих локаций):
#   фронты:  /learn/  -> :3100   (base '/learn/' в apps/learn/capsule.config.ts)
#            /studio/ -> :3050   (PENDING: у playground base ещё '/')
#            /canvas/ -> :3000   (PENDING: у universal-canvas base ещё '/')
#            /auth/   -> :3200   (apps/auth, base '/auth/' — волна ADR 068 ф.1)
#   бэки:    /api/auth/<rest>  -> :8004/auth/<rest>
#            /api/learn/<rest> -> :8003/learn/<rest>
#            /api/lang/<rest>  -> :8002/lang/<rest>
#            /api/voice/<rest> -> :8001/voice/<rest>
#            /api/image/<rest> -> :8005/image/<rest>
#
# Принципы:
#   - gateway ТУПОЙ и stateless: не знает, что запущено; не запущено = 502 на пути.
#   - /api/<svc> срезается до нативного префикса сервиса — сервисы про gateway не знают.
#   - Vite dev = СОТНИ мелких module-запросов: upstream'ы ОБЯЗАНЫ жить с keepalive,
#     иначе docker-прослойка (vpnkit) захлёбывается TCP-handshake'ами → 504
#     (инцидент 2026-07-03: lucide-иконки по 504 на первом заходе).
#   - Connection: пустой для обычных запросов (keepalive), 'upgrade' только для ws (HMR).

worker_processes 1;

events {
  worker_connections 4096;
}

http {
  # ws-upgrade (Vite HMR): Connection 'upgrade' ТОЛЬКО когда клиент просит апгрейд,
  # иначе пустой заголовок → upstream-keepalive работает.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
  }

  # Пул соединений к каждому upstream'у — критично для лавины module-запросов Vite.
  upstream app_learn  { server host.docker.internal:3100; keepalive 64; }
  upstream app_studio { server host.docker.internal:3050; keepalive 64; }
  upstream app_canvas { server host.docker.internal:3000; keepalive 64; }
  upstream app_auth   { server host.docker.internal:3200; keepalive 64; }
  upstream app_community { server host.docker.internal:3400; keepalive 64; }
  upstream svc_auth   { server host.docker.internal:8004; keepalive 16; }
  upstream svc_learn  { server host.docker.internal:8003; keepalive 16; }
  upstream svc_lang   { server host.docker.internal:8002; keepalive 16; }
  upstream svc_voice  { server host.docker.internal:8001; keepalive 16; }
  upstream svc_image  { server host.docker.internal:8005; keepalive 16; }
  upstream svc_community { server host.docker.internal:8006; keepalive 16; }
  upstream s3_minio   { server host.docker.internal:9000; keepalive 16; }

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  # HMR-ws живёт долго.
  proxy_read_timeout 1h;
  proxy_send_timeout 1h;
  keepalive_requests 10000;

  server {
    listen 80;

    # ── фронты ──────────────────────────────────────────────────────────────
    # proxy_pass БЕЗ URI-части: путь уходит как есть — Vite с base '/learn/'
    # сам отвечает под /learn/* (index, ассеты, HMR-ws).
    location /learn/ {
      proxy_pass http://app_learn;
    }

    # фронт /auth/ (не путать с бэком /api/auth/ ниже — не конфликтуют).
    location /auth/ {
      proxy_pass http://app_auth;
    }

    # фронт /community/ (:3400 — НЕ :3300, тот занят Grafana observability).
    location /community/ {
      proxy_pass http://app_community;
    }

    # PENDING base-flip (раскомментировать после перевода base у аппа):
    # location /studio/ { proxy_pass http://app_studio; }
    # location /canvas/ { proxy_pass http://app_canvas; }

    # ── бэки: /api/<svc>/<rest> -> :<port>/<svc>/<rest> ────────────────────
    # proxy_pass С URI-частью: nginx заменяет матчнутый префикс локации.
    # SSE-эндпоинты (появятся с agent-стримингом) — буферизацию выключать
    # per-location: `proxy_buffering off;`.
    location /api/auth/ {
      proxy_pass http://svc_auth/auth/;
    }
    location /api/learn/ {
      proxy_pass http://svc_learn/learn/;
    }
    location /api/lang/ {
      proxy_pass http://svc_lang/lang/;
    }
    location /api/voice/ {
      proxy_pass http://svc_voice/voice/;
    }
    location /api/image/ {
      proxy_pass http://svc_image/image/;
    }
    # community: публикуем ТОЛЬКО /community/* — /internal/* сервиса наружу
    # не маршрутизируется никогда (ADR 071 D4).
    location /api/community/ {
      proxy_pass http://svc_community/community/;
    }
    # публичные медиа (аватарки): bucket public-read в MinIO (ADR 071 D5).
    location /media/avatars/ {
      proxy_pass http://s3_minio/avatars/;
    }

    # ── корень: карта маршрутов для человека ────────────────────────────────
    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }
  }
}
