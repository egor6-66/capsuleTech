# capsule dev-gateway (ADR 068 D6). Поднять один раз и забыть:
#   docker compose -f docker/gateway/compose.yml up -d
services:
  gateway:
    image: nginx:1.27-alpine
    container_name: capsule-gateway
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    extra_hosts:
      # linux-parity; на Docker Desktop (Win/Mac) host.docker.internal есть нативно.
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
