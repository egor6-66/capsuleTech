# capsule dev-gateway (ADR 068 D6). Поднять один раз и забыть:
#   docker compose -f docker/gateway/compose.yml up -d
services:
  gateway:
    image: nginx:1.27-alpine
    container_name: capsule-gateway
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    extra_hosts:
      # linux-parity; на Docker Desktop (Win/Mac) host.docker.internal есть нативно.
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  # MinIO — self-hosted S3 (ADR 071 D5, ADR 072 §3): медиа community (аватарки,
  # вложения). Dev-креды ниже — ТОЛЬКО dev; prod задаёт свои env (ADR 070 ф.1).
  # :9000 API (host-доступ для сервисов), :9001 — веб-консоль.
  minio:
    image: minio/minio:latest
    container_name: capsule-minio
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: capsule-dev
      MINIO_ROOT_PASSWORD: capsule-dev-secret
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  minio-data:
