# capsule preview-server — self-hosted хостинг web-сборок для тестеров.
# Запуск на сервере:  cp .env.example .env && отредактируй DEPLOY_TOKEN, потом
#   docker compose up -d --build
services:
  preview:
    build: .
    image: capsule-preview-server
    container_name: capsule-preview
    restart: unless-stopped
    environment:
      # Токен, который deploy-клиент шлёт в Authorization: Bearer <token>.
      # Без него POST /api/deploy отвечает 503 (deploy отключён).
      DEPLOY_TOKEN: ${DEPLOY_TOKEN:?set DEPLOY_TOKEN in .env}
      PORT: 8080
      PREVIEW_PORT_BASE: 8100
      # host/IP, который тестеры используют для доступа (для построения ссылок).
      # Пусто → берётся из Host-хедера запроса.
      PUBLIC_HOST: ${PUBLIC_HOST:-}
    ports:
      - "8080:8080"
      # По одному порту на приложение. Расширь диапазон (и EXPOSE в Dockerfile),
      # если приложений больше 21.
      - "8100-8120:8100-8120"
    volumes:
      - preview-data:/data

volumes:
  preview-data:
