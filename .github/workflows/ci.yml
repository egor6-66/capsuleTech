name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ownership:
    name: Ownership canon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # warn-mode: репортит нарушения OWNERSHIP-канона, НЕ роняет билд.
      # Флипнуть на `--strict` по мере нормализации доков (срез C3 / Phase 0).
      - run: node scripts/check-ownership.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # nx project-graph loads vite.config.mts files which import
      # @capsuletech/{compliance,vite-builder}. Without their dist
      # the graph creation crashes. Mirror the bootstrap phases from
      # scripts/release.mjs: compliance → vite-builder, then anything.
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/shared-file-manager build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm nx run-many -t typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/shared-file-manager build
          pnpm --filter @capsuletech/vite-builder build
      # Workspace tests (vitest under vite) need every imported package's
      # dist available — source aliases are dev-only. Build everything,
      # then run the test suite.
      - name: Build all workspace packages
        run: pnpm nx run-many -t build
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/shared-file-manager build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm nx run-many -t build

  compliance:
    name: Compliance gate (structural L7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build compliance package
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/compliance build
      # Gate: exits non-zero if any severity:'error' violation exists outside allowlist.
      # Allowlist: docs/_meta/compliance-allowlist.json (known violations with TTL).
      # App cleanup PRs remove entries; once empty the allowlist file can be deleted.
      - name: Check structural violations (app-package-import + disallowed-import)
        run: pnpm compliance:check

  docs-build:
    name: Docs build (ADR 052 Phase 3)
    runs-on: ubuntu-latest
    # Builds @capsuletech/docs package which emits packages/docs/dist/docs.json
    # via DocsExtractPlugin scanning root docs/ with 'docs' slug strategy.
    # Fails on errors (section-id collision, unknown audience); warnings are
    # informational until E2 inventory pass is complete (canon §1.3 / §4.2).
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap builders (docs-builder + lib-builder)
        run: |
          pnpm --filter @capsuletech/docs-builder build
          pnpm --filter @capsuletech/lib-builder build
      - name: Build docs registry
        run: pnpm docs:build
