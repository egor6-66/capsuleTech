name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ownership:
    name: Ownership canon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # warn-mode: репортит нарушения OWNERSHIP-канона, НЕ роняет билд.
      # Флипнуть на `--strict` по мере нормализации доков (срез C3 / Phase 0).
      - run: node scripts/check-ownership.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # nx project-graph loads vite.config.mts files which import
      # @capsuletech/{compliance,vite-builder}. Without their dist
      # the graph creation crashes. Mirror the bootstrap phases from
      # scripts/release.mjs: compliance → vite-builder, then anything.
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/docs-builder build
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/shared-file-manager build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm nx run-many -t typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/docs-builder build
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/shared-file-manager build
          pnpm --filter @capsuletech/vite-builder build
      # Workspace tests (vitest under vite) need every imported package's
      # dist available — source aliases are dev-only. Build everything,
      # then run the test suite.
      - name: Build all workspace packages
        run: pnpm nx run-many -t build
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/docs-builder build
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/shared-file-manager build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm nx run-many -t build

  compliance:
    name: Compliance gate (structural L7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build compliance package
        run: |
          pnpm --filter @capsuletech/lib-builder build
          pnpm --filter @capsuletech/compliance build
      # Gate: exits non-zero if any severity:'error' violation exists outside allowlist.
      # Allowlist: docs/_meta/compliance-allowlist.json (known violations with TTL).
      # App cleanup PRs remove entries; once empty the allowlist file can be deleted.
      - name: Check structural violations (app-package-import + disallowed-import)
        run: pnpm compliance:check

  docs-build:
    name: Docs build (ADR 052 Phase 3)
    runs-on: ubuntu-latest
    # Builds @capsuletech/web-docs which bundles the root docs/ vault into
    # packages/web/docs/dist/docs.json via DocsExtractPlugin with 'docs' slug
    # strategy (ADR 052 Phase 3.6 — previously @capsuletech/docs, removed).
    # Fails on errors (section-id collision, unknown audience); warnings are
    # informational until E2 inventory pass is complete (canon §1.3 / §4.2).
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap builders (docs-builder + lib-builder)
        run: |
          pnpm --filter @capsuletech/docs-builder build
          pnpm --filter @capsuletech/lib-builder build
      - name: Build docs registry
        run: pnpm docs:build

  python:
    name: Python tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    # Python-сервисы монорепо (ADR 054/055/067): learn (BFF-композитор), lang
    # (lexical-граф), voice (TTS, 3.11 — стена SOTA-TTS экосистемы, ADR 065 §3).
    # Лёгкий джоб через uv напрямую; ML-extras voice в CI не ставятся (lazy-import).
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: learn
            python: '3.12'
          - service: lang
            python: '3.12'
          - service: voice
            python: '3.11'
          - service: auth
            python: '3.12'
          - service: image
            python: '3.12'
          - service: community
            python: '3.12'
          - service: llm
            python: '3.12'
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q
