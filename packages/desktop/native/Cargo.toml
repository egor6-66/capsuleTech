[package]
name = "capsule-desktop"
edition = "2021"
version = "0.1.0"
description = "Tauri shell host for any Capsule app"

[lib]
name = "capsule_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "capsule-desktop"
path = "src/main.rs"

[features]
default = ["gpu-nvidia"]
# NVIDIA GPU metrics via nvml-wrapper (runtime libloading — cargo check/CI OK without NVIDIA drivers)
gpu-nvidia = ["dep:nvml-wrapper"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.39"
# nvml-wrapper uses libloading (runtime dlopen) — no link-time dependency on NVML;
# cargo check / CI without NVIDIA drivers is safe.
nvml-wrapper = { version = "0.12", optional = true }
# Explicit deps on crates that tauri brings transitively — needed for direct use.
log = "0.4"
tokio = { version = "1", features = ["time", "sync"] }
